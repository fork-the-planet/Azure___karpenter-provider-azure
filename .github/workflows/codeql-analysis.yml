name: "CodeQL"

on:
  push:
    branches:
      - 'main'
      - 'release-v*'
  pull_request:
  schedule:
    - cron: '0 12 * * *'

permissions:
  contents: read

jobs:
  analyze-go:
    name: Analyze Go
    if: github.repository == 'Azure/karpenter-provider-azure'
    runs-on: ubuntu-latest
    permissions:
      actions: read # github/codeql-action/init@v4
      contents: read
      security-events: write # github/codeql-action/init@v4

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          disable-telemetry: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            dc.services.visualstudio.com:443
            github.com:443
            login.microsoftonline.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            proxy.golang.org:443
            golang.org:443
            raw.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            go.dev:443
            dl.google.com:443
            uploads.github.com:443
            vuln.go.dev:443
            aquasecurity.github.io:443
            mirror.gcr.io:443
            azure.archive.ubuntu.com:80
            packages.microsoft.com:443
            esm.ubuntu.com:443

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/install-deps
      - run: make vulncheck
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
      - uses: github/codeql-action/autobuild@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0

  # Javascript is added here for evaluating Github Action vulnerabilities
  # https://github.blog/2023-08-09-four-tips-to-keep-your-github-actions-workflows-secure/#2-enable-code-scanning-for-workflows
  analyze-github-actions:
    name: Analyze Github Actions
    if: github.repository == 'Azure/karpenter-provider-azure'
    runs-on: ubuntu-latest
    permissions:
      actions: read # github/codeql-action/init@v4
      security-events: write # github/codeql-action/init@v4
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: actions
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
